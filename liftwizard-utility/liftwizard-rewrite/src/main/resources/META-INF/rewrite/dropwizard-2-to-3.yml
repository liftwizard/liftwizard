          recursive: true

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3ViewsPackageRename
displayName: Rename io.dropwizard.views to io.dropwizard.views.common
description: >-
    Rename io.dropwizard.views to io.dropwizard.views.common for JPMS compliance.
recipeList:
