---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3Jetty10Migration
displayName: Migrate Jetty 9 to Jetty 10 API changes
description: >-
    Migrate Jetty API changes introduced in Jetty 10.
    Renames addLifeCycleListener to addEventListener on LifeCycle,
    AbstractLifeCycle, and ContainerLifeCycle.
recipeList:
    - org.openrewrite.java.ChangeMethodName:
          methodPattern: org.eclipse.jetty.util.component.AbstractLifeCycle addLifeCycleListener(..)
          newMethodName: addEventListener
    - org.openrewrite.java.ChangeMethodName:
          methodPattern: org.eclipse.jetty.util.component.ContainerLifeCycle addLifeCycleListener(..)
          newMethodName: addEventListener
    - org.openrewrite.java.ChangeMethodName:
          methodPattern: org.eclipse.jetty.util.component.LifeCycle addLifeCycleListener(..)
          newMethodName: addEventListener

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3Jetty10LoginServiceTypes
displayName: Promote Jetty AbstractLoginService nested types to top-level
description: >-
    In Jetty 10, UserPrincipal and RolePrincipal were promoted from nested
    classes inside AbstractLoginService to top-level classes in the
    org.eclipse.jetty.security package. This recipe rewrites references to
    the old nested-type names so imports resolve under Jetty 10/Dropwizard 3.
    Note: this only handles the type rename; it does NOT change the return
    type of AbstractLoginService.loadRoleInfo (was String[], now
    List<RolePrincipal>) — that signature change requires a custom recipe.
recipeList:
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: org.eclipse.jetty.security.AbstractLoginService$UserPrincipal
          newFullyQualifiedTypeName: org.eclipse.jetty.security.UserPrincipal
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: org.eclipse.jetty.security.AbstractLoginService$RolePrincipal
          newFullyQualifiedTypeName: org.eclipse.jetty.security.RolePrincipal

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3RemoveStaleJettyBom
displayName: Remove stale jetty-bom managed dependency
description: >-
    Remove any explicit jetty-bom managed-dependency import. Dropwizard 3's
    own dropwizard-bom manages a compatible Jetty version, and a project-pinned
    jetty-bom (commonly Jetty 9.4.x) imported BEFORE dropwizard-bom will win
    the BOM-merge order and silently downgrade Jetty back to a Dropwizard 2
    era release, dragging in javax.servlet 3.1 and breaking BannedDependencies.
recipeList:
    - org.openrewrite.maven.RemoveManagedDependency:
          groupId: org.eclipse.jetty
          artifactId: jetty-bom

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3ExcludeStaleJettyServletApi
displayName: Exclude jetty-servlet-api from dependencies
description: >-
    Jetty 10 (which Dropwizard 3 brings in) ships
    org.eclipse.jetty.toolchain:jetty-servlet-api as a transitive dependency.
    Its classes overlap with jakarta.servlet:jakarta.servlet-api (both
    declare classes in the javax.servlet.* package under Jakarta EE 8),
    causing BanDuplicateClasses enforcer failures. Exclude jetty-servlet-api
    so jakarta.servlet-api is the single source of those classes.
recipeList:
    - org.openrewrite.maven.ExcludeDependency:
          groupId: org.eclipse.jetty.toolchain
          artifactId: jetty-servlet-api

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3UtilMigration
displayName: Migrate dropwizard-util removed classes
description: >-
    Migrate removed utility classes from dropwizard-util.
    Replaces io.dropwizard.util.Sets with java.util.Set,
    since Sets.of() is replaced by Set.of() in Java 9+.
recipeList:
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: io.dropwizard.util.Sets
          newFullyQualifiedTypeName: java.util.Set

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3TestingJUnit4Removed
displayName: Roll dropwizard-testing-junit4 references back to dropwizard-testing
description: >-
    Dropwizard 3 removed JUnit 4 support entirely from the testing module —
    the dropwizard-testing-junit4 artifact does not exist on Maven Central.
    This recipe rewrites stale dropwizard-testing-junit4 dependencies back to
    dropwizard-testing so existing projects (and any earlier mis-migration)
    resolve correctly. Source code that still relies on JUnit 4 rules must be
    migrated to JUnit 5 extensions separately (see DropwizardTestingJUnit5Migration).
recipeList:
    - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
          oldGroupId: io.dropwizard
          oldArtifactId: dropwizard-testing-junit4
          newArtifactId: dropwizard-testing

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3LogbackConversionWords
displayName: Migrate Dropwizard logback conversion words
description: >-
    Migrate Dropwizard-specific logback conversion words to their renamed equivalents
    in Dropwizard 3. The old standard logback names are reclaimed, and Dropwizard's
    custom conversion words are prefixed with 'dw'.
    Ordered longest-first to prevent partial matches.
recipeList:
    - org.openrewrite.text.FindAndReplace:
          find: "%rootException"
          replace: "%dwRootException"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%rEx"
          replace: "%dwREx"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%xException"
          replace: "%dwXException"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%xThrowable"
          replace: "%dwXThrowable"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%xEx"
          replace: "%dwXEx"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%exception"
          replace: "%dwException"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%throwable"
          replace: "%dwThrowable"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%ex"
          replace: "%dwEx"
          filePattern: "**/logback*.xml"

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3DependencyUpgrade
displayName: Upgrade Dropwizard dependencies to 3.0.x
description: >-
    Upgrade Dropwizard Maven dependencies from 2.1.x to 3.0.x, including
    common third-party Dropwizard bundles whose version is keyed to the
    Dropwizard major release (e.g. smoketurner graphql-core ships a 3.0.x
    line built against Dropwizard 3).
recipeList:
    - org.openrewrite.maven.UpgradeDependencyVersion:
          groupId: io.dropwizard
          artifactId: "*"
          newVersion: 3.0.x
    - org.openrewrite.maven.UpgradeDependencyVersion:
          groupId: com.smoketurner.dropwizard
          artifactId: graphql-core
          newVersion: 3.x
