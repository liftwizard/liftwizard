type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3MetricsPackageRename
displayName: Rename io.dropwizard.metrics to io.dropwizard.metrics.common
description: >-
    Rename io.dropwizard.metrics to io.dropwizard.metrics.common for JPMS compliance.
recipeList:
    - org.openrewrite.java.ChangePackage:
