---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3Jetty10Migration
displayName: Migrate Jetty 9 to Jetty 10 API changes
description: >-
    Migrate Jetty API changes introduced in Jetty 10.
    Renames addLifeCycleListener to addEventListener on LifeCycle,
    AbstractLifeCycle, and ContainerLifeCycle.
recipeList:
    - org.openrewrite.java.ChangeMethodName:
          methodPattern: org.eclipse.jetty.util.component.AbstractLifeCycle addLifeCycleListener(..)
          newMethodName: addEventListener
    - org.openrewrite.java.ChangeMethodName:
          methodPattern: org.eclipse.jetty.util.component.ContainerLifeCycle addLifeCycleListener(..)
          newMethodName: addEventListener
    - org.openrewrite.java.ChangeMethodName:
          methodPattern: org.eclipse.jetty.util.component.LifeCycle addLifeCycleListener(..)
          newMethodName: addEventListener

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3UtilMigration
displayName: Migrate dropwizard-util removed classes
description: >-
    Migrate removed utility classes from dropwizard-util.
    Replaces io.dropwizard.util.Sets with java.util.Set,
    since Sets.of() is replaced by Set.of() in Java 9+.
recipeList:
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: io.dropwizard.util.Sets
          newFullyQualifiedTypeName: java.util.Set

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3TestingJUnit4Module
displayName: Migrate Dropwizard JUnit 4 testing to separate module
description: >-
    In Dropwizard 3, JUnit 4 support was moved from dropwizard-testing to
    a separate dropwizard-testing-junit4 module. This recipe updates the
    Maven dependency for projects still using JUnit 4 testing rules.
recipeList:
    - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
          oldGroupId: io.dropwizard
          oldArtifactId: dropwizard-testing
          newArtifactId: dropwizard-testing-junit4

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3LogbackConversionWords
displayName: Migrate Dropwizard logback conversion words
description: >-
    Migrate Dropwizard-specific logback conversion words to their renamed equivalents
    in Dropwizard 3. The old standard logback names are reclaimed, and Dropwizard's
    custom conversion words are prefixed with 'dw'.
    Ordered longest-first to prevent partial matches.
recipeList:
    - org.openrewrite.text.FindAndReplace:
          find: "%rootException"
          replace: "%dwRootException"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%rEx"
          replace: "%dwREx"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%xException"
          replace: "%dwXException"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%xThrowable"
          replace: "%dwXThrowable"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%xEx"
          replace: "%dwXEx"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%exception"
          replace: "%dwException"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%throwable"
          replace: "%dwThrowable"
          filePattern: "**/logback*.xml"
    - org.openrewrite.text.FindAndReplace:
          find: "%ex"
          replace: "%dwEx"
          filePattern: "**/logback*.xml"

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3DependencyUpgrade
displayName: Upgrade Dropwizard dependencies to 3.0.x
description: >-
    Upgrade Dropwizard Maven dependencies from 2.1.x to 3.0.x.
recipeList:
    - org.openrewrite.maven.UpgradeDependencyVersion:
          groupId: io.dropwizard
          artifactId: "*"
          newVersion: 3.0.x
