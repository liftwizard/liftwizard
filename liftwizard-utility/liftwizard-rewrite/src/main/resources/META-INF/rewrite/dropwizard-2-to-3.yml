---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard2To3Migration
displayName: Migrate Dropwizard 2 to Dropwizard 3
description: >-
    Comprehensive migration from Dropwizard 2.1.x to Dropwizard 3.0.x.
    Includes JPMS-compliant package renames, Jetty 10 API changes, Apache HttpClient 5 migration,
    dropwizard-util removals, JUnit 4 testing module reorganization,
    logback conversion word updates, and dependency version upgrades.
    Does NOT include javax to jakarta migration, which is the Dropwizard 3 to 4 change.
recipeList:
    - io.liftwizard.rewrite.dropwizard.Dropwizard3PackageRenames
    - io.liftwizard.rewrite.dropwizard.Dropwizard3Jetty10Migration
    - org.openrewrite.apache.httpclient5.UpgradeApacheHttpClient_5
    - io.liftwizard.rewrite.dropwizard.Dropwizard3UtilMigration
    - io.liftwizard.rewrite.dropwizard.Dropwizard3LogbackConversionWords
    - io.liftwizard.rewrite.dropwizard.Dropwizard3DependencyUpgrade
    - io.liftwizard.rewrite.dropwizard.Dropwizard3TestingJUnit4Module

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3PackageRenames
displayName: Dropwizard 3 package renames
description: >-
    Rename Dropwizard packages for JPMS compliance.
    Handles io.dropwizard -> io.dropwizard.core (non-recursive),
    io.dropwizard.setup -> io.dropwizard.core.setup,
    io.dropwizard.cli -> io.dropwizard.core.cli,
    io.dropwizard.logging -> io.dropwizard.logging.common,
    io.dropwizard.metrics -> io.dropwizard.metrics.common,
    io.dropwizard.views -> io.dropwizard.views.common.
recipeList:
    - io.liftwizard.rewrite.dropwizard.Dropwizard3CorePackageRename
    - io.liftwizard.rewrite.dropwizard.Dropwizard3LoggingPackageRename
    - io.liftwizard.rewrite.dropwizard.Dropwizard3MetricsPackageRename
    - io.liftwizard.rewrite.dropwizard.Dropwizard3ViewsPackageRename

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3CorePackageRename
displayName: Rename io.dropwizard core packages to io.dropwizard.core
description: >-
    Rename the four classes that moved from io.dropwizard to io.dropwizard.core
    (Application, Bundle, Configuration, ConfiguredBundle) using ChangeType,
    and rename the subpackages that moved using ChangePackage.
    Uses ChangeType instead of ChangePackage for the top-level package because
    ChangePackage recursive=false incorrectly renames subpackages in practice.
recipeList:
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: io.dropwizard.Application
          newFullyQualifiedTypeName: io.dropwizard.core.Application
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: io.dropwizard.Bundle
          newFullyQualifiedTypeName: io.dropwizard.core.Bundle
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: io.dropwizard.Configuration
          newFullyQualifiedTypeName: io.dropwizard.core.Configuration
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: io.dropwizard.ConfiguredBundle
          newFullyQualifiedTypeName: io.dropwizard.core.ConfiguredBundle
    - org.openrewrite.java.ChangePackage:
          oldPackageName: io.dropwizard.setup
          newPackageName: io.dropwizard.core.setup
          recursive: true
    - org.openrewrite.java.ChangePackage:
          oldPackageName: io.dropwizard.cli
          newPackageName: io.dropwizard.core.cli
          recursive: true
    - org.openrewrite.java.ChangePackage:
          oldPackageName: io.dropwizard.server
          newPackageName: io.dropwizard.core.server
          recursive: true
    - org.openrewrite.java.ChangePackage:
          oldPackageName: io.dropwizard.sslreload
          newPackageName: io.dropwizard.core.sslreload
          recursive: true

---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.dropwizard.Dropwizard3LoggingPackageRename
displayName: Rename io.dropwizard.logging to io.dropwizard.logging.common
description: >-
    Rename io.dropwizard.logging to io.dropwizard.logging.common for JPMS compliance.
    Includes all subpackages (async, filter, layout).
recipeList:
    - org.openrewrite.java.ChangePackage:
          oldPackageName: io.dropwizard.logging
          newPackageName: io.dropwizard.logging.common
          recursive: true

