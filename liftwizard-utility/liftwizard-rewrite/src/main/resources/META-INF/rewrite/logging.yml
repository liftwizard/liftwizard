---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.logging.Log4j1ToSlf4j1
displayName: Migrate Log4j 1.x to SLF4J 1.x (skipping object logging)
description: >-
    Transforms usages of Log4j 1.x to leveraging SLF4J 1.x directly.
    Unlike the upstream recipe, this version skips files that pass non-String
    Objects to Log4j 1 logging methods (e.g., LOGGER.info(myObject)),
    preserving structured logging capabilities. Files with object logging
    remain on Log4j 1 and must be migrated manually.
preconditions:
    - io.liftwizard.rewrite.logging.DoesNotUseLog4j1ObjectLogging
recipeList:
    - org.openrewrite.java.ChangeType:
          oldFullyQualifiedTypeName: org.apache.log4j.MDC
          newFullyQualifiedTypeName: org.slf4j.MDC
    - org.openrewrite.java.logging.log4j.Log4j1ToLog4j2
    - org.openrewrite.java.logging.slf4j.Log4j2ToSlf4j1
---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.rewrite.LoggingBestPractices
displayName: Logging best practices
description: Transform logging statements to use SLF4J parameterized logging for better performance.
recipeList:
    - org.openrewrite.java.logging.slf4j.StringFormatToParameterizedLogging
    - org.openrewrite.java.logging.slf4j.MessageFormatToParameterizedLogging
    - io.liftwizard.rewrite.logging.ParameterizedLogging:
          methodPattern: org.slf4j.Logger trace(..)
    - io.liftwizard.rewrite.logging.ParameterizedLogging:
          methodPattern: org.slf4j.Logger debug(..)
    - io.liftwizard.rewrite.logging.ParameterizedLogging:
          methodPattern: org.slf4j.Logger info(..)
    - io.liftwizard.rewrite.logging.ParameterizedLogging:
          methodPattern: org.slf4j.Logger warn(..)
    - io.liftwizard.rewrite.logging.ParameterizedLogging:
          methodPattern: org.slf4j.Logger error(..)
    - org.openrewrite.java.logging.slf4j.StripToStringFromArguments
    - org.openrewrite.java.logging.slf4j.RemoveUnnecessaryLogLevelGuards
