---
type: specs.openrewrite.org/v1beta/recipe
name: io.liftwizard.UpdateCopyrightYear
displayName: Update copyright year to 2026
description: Updates copyright year to 2026 in existing license headers.
tags:
    - license
recipeList:
    - org.openrewrite.text.FindAndReplace:
          find: 'Copyright (20\d{2}) Craig Motlin'
          replace: "Copyright 2026 Craig Motlin"
          regex: true
